<div class="d-flex vh-100 overflow-hidden">

  <!-- SIDEBAR -->
  <aside
    class="sidebar d-flex flex-column flex-shrink-0 p-3 bg-dark text-white"
    [class.collapsed]="isSidebarCollapsed"
    [class.mobile-open]="!isSidebarCollapsed">

    <!-- Brand + Mobile Close -->
    <div class="d-flex align-items-center justify-content-between mb-3 px-2">
      <a href="/" class="d-flex align-items-center text-white text-decoration-none">
        <i class="bi bi-rocket-takeoff fs-4 me-2 flex-shrink-0"></i>
        <span class="fs-5 fw-bold sidebar-text">FreelanceOS</span>
      </a>

      <!-- Close button — mobile only (hidden on desktop via CSS) -->
      <button class="btn text-white sidebar-close-btn p-0 d-md-none" (click)="toggleSidebar()">
        <i class="bi bi-x-lg fs-5"></i>
      </button>
    </div>

    <hr class="border-secondary">

    <!-- Nav links -->
    <ul class="nav nav-pills flex-column mb-auto gap-1">
      <li class="nav-item">
        <a routerLink="/overview" routerLinkActive="active"
           class="nav-link text-white px-3"
           (click)="onNavLinkClick()">
          <i class="bi bi-speedometer2 me-2 flex-shrink-0"></i>
          <span class="sidebar-text">Overview</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/projects" routerLinkActive="active"
           class="nav-link text-white px-3"
           (click)="onNavLinkClick()">
          <i class="bi bi-kanban me-2 flex-shrink-0"></i>
          <span class="sidebar-text">Projects</span>
        </a>
      </li>
    </ul>

    <!-- Desktop collapse toggle (bottom of sidebar) -->
    <div class="d-none d-md-block mt-auto pt-3 border-top border-secondary">
      <button class="btn text-white w-100 d-flex align-items-center px-3"
              [class.justify-content-center]="isSidebarCollapsed"
              (click)="toggleSidebar()">
        <i class="bi flex-shrink-0"
           [class.bi-chevron-double-left]="!isSidebarCollapsed"
           [class.bi-chevron-double-right]="isSidebarCollapsed"
           >
          </i>
        <span class="sidebar-text ms-2">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- MAIN LAYOUT -->
  <div class="main-layout-container d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- HEADER -->
    <header class="navbar navbar-light bg-white shadow-sm px-3 px-md-4 py-2 border-bottom">
      <div class="container-fluid d-flex align-items-center p-0">

        <!-- Mobile hamburger -->
        <button class="btn btn-light border d-md-none me-3 flex-shrink-0"
                (click)="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>

        <!-- Right side: user menu -->
        <div class="ms-auto d-flex align-items-center">
          <div class="dropdown">
            <a href="#"
               class="d-flex align-items-center text-decoration-none dropdown-toggle text-dark"
               data-bs-toggle="dropdown"
               aria-expanded="false">
              <img src="/assets/images/profile.jpg" alt="Profile"
                   width="32" height="32"
                   class="rounded-circle me-2 border object-fit-cover">
              <span class="d-none d-sm-inline fw-semibold">Zohaib Hassan</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
              <li>
                <a class="dropdown-item" routerLink="/profile" (click)="onNavLinkClick()">
                  <i class="bi bi-person me-2"></i>Profile
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <a class="dropdown-item text-danger" href="#">
                  <i class="bi bi-box-arrow-right me-2"></i>Sign out
                </a>
              </li>
            </ul>
          </div>
        </div>

      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="main-content flex-grow-1 overflow-auto bg-light">
      <div class="container-fluid p-3 p-md-4">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

  <!-- MOBILE BACKDROP -->
  <div class="sidebar-backdrop"
       [class.visible]="!isSidebarCollapsed"
       (click)="toggleSidebar()">
  </div>

</div>
